<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>🕮 NoteShelf</title>

  <link rel="stylesheet" href="style.css" />

  <style>
    /* === Rate Us Popup Styles === */
    #popupRate {
      position: fixed;
      top: -150px; /* start offscreen at top */
      left: 50%;
      transform: translateX(-50%);
      width: 200px;
      background: linear-gradient(135deg, #93ff8f, #cdf5cb);
      color: white;
      font-family: Arial, sans-serif;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 8px 15px rgba(0,0,0,0.3);
      transition: top 0.5s ease-in-out;
      z-index: 9999;
      text-align: center;
      font-size: 14px;
    }

    #popupRate .closeBtn {
      position: absolute;
      top: 5px;
      right: 8px;
      font-weight: bold;
      cursor: pointer;
      color: white;
      font-size: 16px;
    }

    #popupRate h2 {
      margin: 0 0 8px 0;
      font-size: 16px;
    }

    #popupRate p {
      margin: 0 0 10px 0;
      font-size: 13px;
    }

    .stars {
      display: flex;
      justify-content: center;
      gap: 4px;
      font-size: 20px;
      cursor: pointer;
    }

    .stars span {
      color: rgba(0, 0, 0, 0.5);
      transition: color 0.3s;
    }

    #thankYou {
      margin-top: 8px;
      font-size: 12px;
      display: none;
    }

    /* === General page styles === */
    body {
      margin: 0;
      background: #0f0f0f;
      font-family: 'Segoe UI', sans-serif;
      color: gold;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Content wrapper to push footer to bottom on short pages */
    .page-content {
      flex: 1 0 auto;
    }

    /* === Footer Feedback Section (scrolls with page) === */
    .bottom-container {
      flex-shrink: 0;
      text-align: center;
      padding: 20px 0;
      margin-top: 40px;
      background: #050505;
      border-top: 1px solid #333;
    }

    .bottom-container p {
      font-size: 18px;
      margin-bottom: 15px;
      letter-spacing: 1px;
    }

    .gold-btn {
      padding: 14px 35px;
      font-size: 16px;
      font-weight: bold;
      border: 2px solid gold;
      border-radius: 30px;
      background: linear-gradient(135deg, #1a1a1a, #000);
      color: gold;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
    }

    .gold-btn:hover {
      background: gold;
      color: black;
      box-shadow: 0 0 25px gold;
      transform: scale(1.05);
    }

    .gold-btn:active {
      transform: scale(0.95);
    }
  </style>
</head>

<body>
  <div class="page-content">
    <!-- Top-right "Check Out Nomis" button -->
    <div id="top-buttons-main">
      <button class="top-btn check-out-btn"
              onclick="window.open('https://nomis-code-chat--r2ftzu1ha2vy.replit.app', '_blank')">
        Check Out Nomis
      </button>
    </div>

    <!-- Top bar with trailers/auth/profile -->
    <div id="top-bar"
         style="display:flex; align-items:center; justify-content:space-between; padding:10px; background:#111; color:#fff;">
      <div id="top-buttons-auth">
        <button id="trailer-btn" class="top-btn">▸ Game Trailers</button>
        <button id="signup-btn" class="top-btn">Sign Up</button>
        <button id="login-btn" class="top-btn">Log In</button>
        <button id="logout-btn" class="top-btn" style="display:none;">Log Out</button>
      </div>

      <div id="profile" style="display:flex; align-items:center; gap:10px;">
        <img id="user-avatar" src="" alt="avatar"
             style="width:40px; height:40px; border-radius:50%; display:none;">
        <span id="username-display"
              style="color:#fff; font-weight:bold; display:none;"></span>
      </div>
    </div>

    <h1 style="margin-left:140px; color:gold;">🕮 NoteShelf</h1>
    <h4 style="margin-left:140px; color:gold;">NomisAi has been released</h4>

    <!-- Search bar -->
    <input type="text" id="search-bar" placeholder="Search games..."
           style="margin:10px 0 10px 140px; padding:5px; width:200px;">

    <!-- Category sidebar -->
    <div id="category-sidebar"
         style="position:fixed; left:0; top:100px; width:120px; background:#222; color:#fff; padding:10px; display:flex; flex-direction:column; gap:5px;">
      <!-- Buttons will be generated by JS -->
    </div>

    <!-- Game list -->
    <div id="game-list"
         style="margin-left:140px; padding:10px; display:flex; flex-wrap:wrap; gap:10px;"></div>

    <!-- Game viewer -->
    <div id="game-viewer"
         style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); justify-content:center; align-items:center; flex-direction:column; z-index:1000;">
      <button id="close-btn" style="margin-bottom:10px;">ⓧ Close Game</button>
      <iframe id="game-frame" src=""
              style="width:80%; height:80%;"
              sandbox="allow-same-origin allow-scripts allow-forms allow-pointer-lock"
              referrerpolicy="no-referrer"></iframe>
    </div>

    <!-- Auth popup -->
    <div id="auth-popup"
         style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:#222; color:#fff; padding:20px; border-radius:10px; z-index:2000;">
      <div id="auth-box">
        <button id="close-auth" style="float:right;">❌</button>
        <h2 id="auth-title"></h2>
        <input id="auth-username" type="text" placeholder="Username"
               style="display:block; margin:5px 0;">
        <input id="auth-password" type="password" placeholder="Password"
               style="display:block; margin:5px 0;">
        <input id="auth-avatar" type="file" accept="image/*"
               style="display:block; margin:5px 0;">
        <img id="avatar-preview" src="" alt="Avatar Preview"
             style="display:none; width:50px; height:50px; border-radius:50%;">
        <button id="auth-submit" style="display:block; margin-top:10px;">Submit</button>
        <p id="auth-message"></p>
      </div>
    </div>

    <!-- Admin panel on right (Global Message only) -->
    <div id="admin-panel" style="
      display:none;
      position:fixed;
      top:50px;
      right:0;
      width:300px;
      height:calc(100% - 60px);
      background:#111;
      color:#fff;
      padding:15px;
      border-left:2px solid #444;
      overflow-y:auto;
      z-index:9999;
      font-family:sans-serif;
    ">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <h3>🌍 Global Message</h3>
        <button id="close-admin" style="
          background:none; border:none; color:#fff; font-size:18px; cursor:pointer;">❌</button>
      </div>

      <!-- Input + Send -->
      <div style="margin-top:15px;">
        <input id="global-message-input" type="text" placeholder="Type message..."
               style="width:100%; padding:8px; border:none; border-radius:4px; margin-bottom:10px;">
        <button id="global-message-send" style="
          width:100%; padding:8px; background:#28a745; border:none; border-radius:4px; color:#fff; cursor:pointer;">
          Send
        </button>
      </div>
    </div>

    <!-- Single Global message popup (all users see this) -->
    <div id="global-message-popup" style="
      display:none;
      position:fixed;
      top:0;
      left:50%;
      transform:translateX(-50%) translateY(-50px);
      background:rgba(0,0,0,0.85);
      color:#fff;
      padding:15px 25px;
      border-radius:8px;
      font-size:16px;
      font-weight:bold;
      z-index:9999;
      opacity:0;
      transition: opacity 0.2s ease, transform 0.2s ease;
    "></div>

    <!-- Rate Us Popup -->
    <div id="popupRate">
      <span class="closeBtn" onclick="closePopupRate()">×</span>
      <h2>⭐ Enjoying our web?</h2>
      <p>Tap below to rate us!</p>
      <div class="stars" id="starContainer">
        <span data-value="1">&#9733;</span>
        <span data-value="2">&#9733;</span>
        <span data-value="3">&#9733;</span>
        <span data-value="4">&#9733;</span>
        <span data-value="5">&#9733;</span>
      </div>
      <div id="thankYou"></div>
    </div>
  </div>

  <!-- Bottom Feedback Section (footer, not fixed) -->
  <div class="bottom-container">
    <p>Give us your feedback!</p>
    <button class="gold-btn" onclick="openFeedbackTab()">Feedback</button>
  </div>

  <!-- For local file usage: -->
  <script src="script.js"></script>

  <script>
    // === Rate Us Popup Logic ===
    const popupRate = document.getElementById('popupRate');
    const stars = document.querySelectorAll('#starContainer span');
    const thankYou = document.getElementById('thankYou');
    let selectedRating = 0;

    // Slide down after 10 seconds (adjust as desired)
    setTimeout(() => {
      popupRate.style.top = '20px';
    }, 300000);

    function interpolateColor(value, max) {
      const start = { r: 255, g: 0, b: 0 };   // red
      const end = { r: 255, g: 215, b: 0 };   // gold
      const factor = (value - 1) / (max - 1);
      const r = Math.round(start.r + factor * (end.r - start.r));
      const g = Math.round(start.g + factor * (end.g - start.g));
      const b = Math.round(start.b + factor * (end.b - start.b));
      return `rgb(${r},${g},${b})`;
    }

    stars.forEach(star => {
      star.addEventListener('mouseover', () => {
        stars.forEach(s => {
          s.style.color = 'rgba(0,0,0,0.5)'; // reset
        });
        stars.forEach(s => {
          if (parseInt(s.dataset.value) <= parseInt(star.dataset.value)) {
            s.style.color = interpolateColor(s.dataset.value, 5);
          }
        });
      });

      star.addEventListener('mouseout', () => {
        stars.forEach(s => {
          if (parseInt(s.dataset.value) <= selectedRating) {
            s.style.color = interpolateColor(s.dataset.value, 5);
          } else {
            s.style.color = 'rgba(0,0,0,0.5)';
          }
        });
      });

      star.addEventListener('click', () => {
        selectedRating = parseInt(star.dataset.value);
        stars.forEach(s => {
          if (parseInt(s.dataset.value) <= selectedRating) {
            s.style.color = interpolateColor(s.dataset.value, 5);
          } else {
            s.style.color = 'rgba(0,0,0,0.5)';
          }
        });
        thankYou.style.display = 'block';
        thankYou.textContent =
          `Thanks for rating us ${selectedRating} star${selectedRating > 1 ? 's' : ''}!`;

        // Hide popup after rating
        popupRate.style.top = '-150px';
      });
    });

    function closePopupRate() {
      popupRate.style.top = '-150px';
    }

    // === Feedback Button Logic ===
    function openFeedbackTab() {
      window.open('https://codepen.io/R2FtZU1ha2Vy/full/GgjpzwB', '_blank');
    }

    // Expose functions to global scope
    window.closePopupRate = closePopupRate;
    window.openFeedbackTab = openFeedbackTab;
  </script>
</body>
</html>
