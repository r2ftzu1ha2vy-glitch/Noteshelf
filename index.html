<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>🕮 NoteShelf</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;900&family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="page-content">

    <!-- ── Top-right: Update Logs ── -->
    <div id="top-buttons-main">
      <button class="top-btn check-out-btn"
              onclick="window.open('https://r2ftzu1ha2vy-glitch.github.io/Update-Logs/', '_blank')">
        Update Logs
      </button>
    </div>

    <!-- ── Top bar ── -->
    <div id="top-bar">
      <div id="top-buttons-auth">
        <button id="trailer-btn"  class="top-btn">▸ Trailers</button>
        <button id="signup-btn"   class="top-btn">Sign Up</button>
        <button id="login-btn"    class="top-btn">Log In</button>
        <button id="logout-btn"   class="top-btn" style="display:none;">Log Out</button>
      </div>
      <div id="profile" style="display:flex;align-items:center;gap:10px;">
        <img id="user-avatar" src="" alt="avatar"
             style="width:36px;height:36px;border-radius:50%;display:none;border:2px solid var(--gold-dim);">
        <span id="username-display" style="display:none;"></span>
      </div>
    </div>

    <!-- ── Page heading ── -->
    <h1>🕮 NoteShelf</h1>
    <h4>Your Gaming Sanctuary</h4>

    <!-- ── Search ── -->
    <input type="text" id="search-bar" placeholder="Search games…">

    <!-- ── Category sidebar ── -->
    <div id="category-sidebar"></div>

    <!-- ── Game grid ── -->
    <div id="game-list"></div>

    <!-- ── In-page game viewer ── -->
    <div id="game-viewer" style="display:none;">
      <button id="close-btn">ⓧ Close</button>
      <iframe id="game-frame" src=""
              sandbox="allow-same-origin allow-scripts allow-forms allow-pointer-lock"
              referrerpolicy="no-referrer"></iframe>
    </div>

    <!-- ════════════════════════════
         DISCORD FLOATING BUTTON
    ════════════════════════════ -->
    <div id="discord-btn-wrap">
      <a id="discord-btn"
         href="https://discord.gg/K3Cdn64uC"
         target="_blank"
         rel="noopener noreferrer"
         aria-label="Join our Discord">
        <!-- Official Discord SVG -->
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M20.317 4.492c-1.53-.69-3.17-1.2-4.885-1.49a.075.075 0 0 0-.079.036
                   c-.21.369-.444.85-.608 1.23a18.566 18.566 0 0 0-5.487 0
                   a12.36 12.36 0 0 0-.617-1.23A.077.077 0 0 0 8.562 3
                   c-1.714.29-3.354.8-4.885 1.491a.07.07 0 0 0-.032.027
                   C.533 9.093-.32 13.555.099 17.961a.08.08 0 0 0 .031.055
                   a20.03 20.03 0 0 0 5.993 2.98.078.078 0 0 0 .084-.026
                   c.462-.62.874-1.275 1.226-1.963.021-.04.001-.088-.041-.104
                   a13.201 13.201 0 0 1-1.872-.878.075.075 0 0 1-.008-.125
                   c.126-.093.252-.19.372-.287a.075.075 0 0 1 .078-.01
                   c3.927 1.764 8.18 1.764 12.061 0a.075.075 0 0 1 .079.009
                   c.12.098.245.195.372.288a.075.075 0 0 1-.006.125
                   c-.598.344-1.22.635-1.873.877a.075.075 0 0 0-.041.105
                   c.36.687.772 1.341 1.225 1.962a.077.077 0 0 0 .084.028
                   a19.963 19.963 0 0 0 6.002-2.981.076.076 0 0 0 .032-.054
                   c.5-5.094-.838-9.52-3.549-13.442a.06.06 0 0 0-.031-.028z
                   M8.02 15.278c-1.182 0-2.157-1.069-2.157-2.38
                   0-1.312.956-2.38 2.157-2.38 1.21 0 2.176 1.077 2.157 2.38
                   0 1.312-.956 2.38-2.157 2.38z
                   m7.975 0c-1.183 0-2.157-1.069-2.157-2.38
                   0-1.312.955-2.38 2.157-2.38 1.21 0 2.176 1.077 2.157 2.38
                   0 1.312-.946 2.38-2.157 2.38z"/>
        </svg>
      </a>
      <span id="discord-label">Join the Discord</span>
    </div>

    <!-- ── Chat toggle ── -->
    <button id="chat-toggle">💬</button>

    <!-- ── Chat panel ── -->
    <div id="chat-panel">
      <div id="chat-header">
        <span>Global Chat</span>
        <button id="chat-close">✖</button>
      </div>
      <div id="chat-messages"></div>
      <div id="typing-indicator"></div>
      <div id="chat-input-area">
        <input id="chat-input" placeholder="Type a message…" />
        <button id="chat-send">Send</button>
      </div>
    </div>

    <!-- ── Auth popup ── -->
    <div id="auth-popup" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:2000;">
      <div id="auth-box">
        <button id="close-auth">❌</button>
        <h2 id="auth-title"></h2>
        <input id="auth-username" type="text"     placeholder="Username">
        <input id="auth-password" type="password" placeholder="Password">
        <input id="auth-avatar"   type="file"     accept="image/*">
        <img   id="avatar-preview" src="" alt="Avatar Preview"
               style="display:none;width:50px;height:50px;border-radius:50%;margin-top:8px;">
        <button id="auth-submit">Submit</button>
        <p id="auth-message"></p>
      </div>
    </div>

    <!-- ── Admin panel ── -->
    <div id="admin-panel" style="display:none;position:fixed;top:50px;right:0;width:300px;
         height:calc(100% - 60px);padding:15px;overflow-y:auto;z-index:9999;">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <h3>🌍 Global Message</h3>
        <button id="close-admin">❌</button>
      </div>
      <div style="margin-top:15px;">
        <input  id="global-message-input"  type="text" placeholder="Type message…">
        <button id="global-message-send">Send</button>
      </div>
    </div>

    <!-- ── Global message toast ── -->
    <div id="global-message-popup" style="display:none;position:fixed;top:0;left:50%;
         transform:translateX(-50%) translateY(-50px);padding:15px 25px;
         border-radius:8px;font-size:16px;font-weight:bold;z-index:9999;
         opacity:0;transition:opacity .2s ease,transform .2s ease;"></div>

    <!-- ── Rate Us popup ── -->
    <div id="popupRate">
      <span class="closeBtn" onclick="closePopupRate()">×</span>
      <h2>★ Enjoying our web?</h2>
      <p>Tap below to rate us!</p>
      <div class="stars" id="starContainer">
        <span data-value="1">&#9733;</span>
        <span data-value="2">&#9733;</span>
        <span data-value="3">&#9733;</span>
        <span data-value="4">&#9733;</span>
        <span data-value="5">&#9733;</span>
      </div>
      <div id="thankYou"></div>
    </div>

  </div><!-- /.page-content -->

  <!-- ── Footer ── -->
  <div class="bottom-container">
    <p>Give us your feedback!</p>
    <button class="gold-btn" onclick="openFeedbackTab()">Feedback</button>
  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <script src="script.js"></script>

  <script>
    /* ── Rate Us ── */
    const popupRate    = document.getElementById('popupRate');
    const stars        = document.querySelectorAll('#starContainer span');
    const thankYou     = document.getElementById('thankYou');
    let selectedRating = 0;

    setTimeout(() => { popupRate.style.top = '20px'; }, 300000);

    function interpolateColor(value, max) {
      const s = { r:255,g:0,b:0 }, e = { r:255,g:215,b:0 };
      const f = (value - 1) / (max - 1);
      return `rgb(${Math.round(s.r+f*(e.r-s.r))},${Math.round(s.g+f*(e.g-s.g))},${Math.round(s.b+f*(e.b-s.b))})`;
    }

    stars.forEach(star => {
      star.addEventListener('mouseover', () => {
        stars.forEach(s => s.style.color = 'rgba(0,0,0,0.4)');
        stars.forEach(s => {
          if (parseInt(s.dataset.value) <= parseInt(star.dataset.value))
            s.style.color = interpolateColor(s.dataset.value, 5);
        });
      });
      star.addEventListener('mouseout', () => {
        stars.forEach(s => {
          s.style.color = parseInt(s.dataset.value) <= selectedRating
            ? interpolateColor(s.dataset.value, 5)
            : 'rgba(0,0,0,0.4)';
        });
      });
      star.addEventListener('click', () => {
        selectedRating = parseInt(star.dataset.value);
        stars.forEach(s => {
          s.style.color = parseInt(s.dataset.value) <= selectedRating
            ? interpolateColor(s.dataset.value, 5)
            : 'rgba(0,0,0,0.4)';
        });
        thankYou.style.display = 'block';
        thankYou.textContent   = `Thanks for ${selectedRating} star${selectedRating > 1 ? 's' : ''}!`;
        setTimeout(() => { popupRate.style.top = '-160px'; }, 1500);
      });
    });

    function closePopupRate()  { popupRate.style.top = '-160px'; }
    function openFeedbackTab() { window.open('https://r2ftzu1ha2vy-glitch.github.io/Feedback-Centre/', '_blank'); }

    window.closePopupRate  = closePopupRate;
    window.openFeedbackTab = openFeedbackTab;
  </script>
</body>
</html>
